# @package _global_
defaults:
  - _self_
  - model: kasm
  - data: trip_advisor
  - logdir: default
  - override hydra/hydra_logging: default
  - override hydra/job_logging: default

train:
  num_epoch: 15
  batch_size: 16
  num_workers: 4
  prefetch_factor: 4
  persistent_workers: true
  lr: 1.5e-06
  scheduler_factor: 0.8
  scheduler_patience: 2
  patience: null
  clip_grad: 0.5

dev:
  batch_size: 8
  num_workers: 2
  prefetch_factor: 2
  persistent_workers: true

test:
  batch_size: 8
  num_workers: 2
  prefetch_factor: 2
  persistent_workers: true
  threshold: 0.5
  monitor: test/acc_epoch

root_dir: ${hydra:runtime.cwd}
data_dir: ${root_dir}/dataset/${data.name}
output_dir: ${hydra:run.dir}
cache_dir: ${root_dir}/outputs/cache

task: KASM
seed: 42
gpu: 0
debug: null
overfit_batches: 0
val_check_interval: 0.5
num_sanity_val_steps: 0
limit_train_batches: null
limit_val_batches: null
deterministic: true
ckpt_path: null

hydra:
  run:
    dir: ${root_dir}/logs/runs/${data.name}_${task}_${model.arch}_${now:%Y-%m-%d_%H-%M-%S}
